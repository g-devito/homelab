- name: Install required system packages
  apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - python3-docker
    state: present
    update_cache: yes

- name: Set Docker apt architecture
  ansible.builtin.set_fact:
    docker_apt_arch: "{{ 'amd64' if ansible_architecture in ['x86_64', 'amd64'] else 'arm64' if ansible_architecture in ['aarch64', 'arm64'] else ansible_architecture }}"
- name: Create dir for Docker's GPG key
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'
- name: Add Docker's official GPG key
  get_url:
    url: https://download.docker.com/linux/debian/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'
    force: true
- name: Add Docker Repository
  copy:
    dest: /etc/apt/sources.list.d/docker.list
    content: "deb [arch={{ docker_apt_arch }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/debian {{ ansible_distribution_release }} stable"
    owner: root
    group: root
    mode: '0644'
- name: Install Docker Engine and plugins
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: yes
- name: Add current user to Docker's group
  user:
    name: "{{ ansible_user }}"
    groups: docker
    append: yes
